<!DOCTYPE html>
<html>
<head>
   <meta charset="utf-8">
   <title>Hearthskin Loading UI</title>
   <link rel="stylesheet" type="text/css" href="/stonehearth/ui/root/css/jqueryui.css" />

   <script src="/radiant/js/external/underscore-1.5.2.js"></script>
   <script src="/radiant/js/external/jquery-2.1.4.min.js"></script>
   <script src="/radiant/js/external/simple_class.js"></script>
   <script src="/radiant/js/radiant/core.js"></script>
   <script src="/radiant/js/radiant/object.js"></script>
   <script src="/radiant/js/radiant/trace.js"></script>
   <script src="/radiant/js/radiant/radiant_console.js"></script>

   <script src="js/libs/jquery-ui-1.10.3.js"></script>
   <script src="js/libs/i18next-1.10.1.js"></script>
   <script src="/radiant/js/radiant/standalone_page.js"></script>

   <style>
      @font-face {
         font-family: 'AutourOne';
         src: url('/hearthskin-ui/ui/shell/loading_screen/fonts/autourone-ru/AutourOne-Regular-Ru.woff');
      }

      @font-face {
         font-family: 'OfelixGro';
         src: url('/hearthskin-ui/ui/shell/loading_screen/fonts/ofelixgro/ofelixgro.woff');
      }

      html, body {
         margin: 0;
         padding: 0;
         width: 100%;
         height: 100%;
         overflow: hidden;
         background: #1c140d;
      }

      #loadingScreen {
         position: absolute;
         top: 0;
         left: 0;
         right: 0;
         bottom: 0;
         overflow: hidden;
         color: #fff;
         background-color: #1c140d;
         background-image: url('/hearthskin-ui/ui/shell/loading_screen/images/bg.png');
         background-position: center center;
         background-repeat: no-repeat;
         background-size: cover;
      }

      .corner {
         position: absolute;
         width: 40px;
         height: 40px;
         background-image: url('/hearthskin-ui/ui/shell/loading_screen/images/border.png');
         background-repeat: no-repeat;
         z-index: 3;
      }

      .top-left {
         top: 20px;
         left: 20px;
         background-position: top left;
      }

      .top-right {
         top: 20px;
         right: 20px;
         background-position: top right;
      }

      .bottom-left {
         bottom: 20px;
         left: 20px;
         background-position: bottom left;
      }

      .bottom-right {
         bottom: 20px;
         right: 20px;
         background-position: bottom right;
      }

      #hero {
         position: absolute;
         top: 55%;
         left: -20%;
         width: 1200pt;
         height: 1200pt;
         margin-top: -600pt;
         background-image: url('/hearthskin-ui/ui/shell/loading_screen/images/bg2.png');
         background-position: left center;
         background-repeat: no-repeat;
         background-size: contain;
         z-index: 1;
      }

      #infoPanel {
         position: absolute;
         top: 34%;
         right: 8%;
         width: 500pt;
         margin-top: -180pt;
         z-index: 2;
      }

      #titleFrame {
         min-height: 112pt;
         padding: 24pt 0 39pt;
         background-image: url('/hearthskin-ui/ui/shell/loading_screen/images/crafter_shingle.png');
         background-position: center center;
         background-repeat: no-repeat;
         background-size: 100% 100%;
      }

      #title {
         margin: 0;
         color: #ffb93a;
         text-align: center;
         font-family: 'OfelixGro', sans-serif;
         font-size: 31pt;
         letter-spacing: 1px;
         text-shadow: 0 3px 0 rgba(73, 35, 10, 0.35);
      }

      #descriptionFrame {
         margin-top: 18px;
         min-height: 167pt;
         max-height: 167pt;
         padding: 49pt 16pt;
         box-sizing: border-box;
         background-image: url('/hearthskin-ui/ui/shell/loading_screen/images/scroll_bg.png');
         background-position: center center;
         background-repeat: no-repeat;
         background-size: 100% 100%;
      }

      #description {
         color: #2d2a24;
         font-family: 'AutourOne', serif;
         font-size: 11pt;
         line-height: 1.45;
         text-align: center;
         display: flex;
         align-items: center;
         justify-content: center;
         height: 100%;
         overflow: hidden;
      }

      #controls {
         position: absolute;
         left: 50%;
         bottom: 12%;
         width: 300pt;
         height: 93px;
         margin-left: -150pt;
         z-index: 4;
      }

      #frame {
         position: absolute;
         top: 0;
         left: 0;
         width: 100%;
         height: 100%;
         background-image: url('/hearthskin-ui/ui/shell/loading_screen/images/progress_frame.png');
         background-position: center center;
         background-repeat: no-repeat;
         background-size: contain;
      }

      #message {
         position: absolute;
         top: 23px;
         left: 48px;
         right: 48px;
         color: #fff8eb;
         font-family: 'AutourOne', serif;
         font-size: 11pt;
         text-align: center;
         text-shadow: -2px -2px 0 #1b1b1b, 2px -2px 0 #1b1b1b, -2px 2px 0 #1b1b1b, 2px 2px 0 #1b1b1b;
         z-index: 2;
      }

      #progressbar {
         position: absolute;
         top: 12px;
         left: 15px;
         width: 270pt;
         height: 38px;
      }

      .ui-progressbar {
         height: 20px;
         text-align: left;
         overflow: hidden;
         background: none;
      }

      .ui-progressbar .ui-progressbar-value {
         position: absolute;
         margin: 0;
         height: 35px;
         background: #3c51bc;
         border-width: 5px 5px 10px 5px;
         border-image: url(/stonehearth/ui/root/css/images/progressbar/meter.png) 5 5 10 5 repeat;
         border-style: solid;
      }

   </style>
</head>

<body>
   <div id="loadingScreen">
      <div class="corner top-left"></div>
      <div class="corner top-right"></div>
      <div class="corner bottom-left"></div>
      <div class="corner bottom-right"></div>

      <div id="hero"></div>

      <div id="infoPanel">
         <div id="titleFrame">
            <h1 id="title">MAGMASMITH</h1>
         </div>
         <div id="descriptionFrame">
            <div id="description">
               Preparing the forge for another long night.
            </div>
         </div>
      </div>

      <div id="controls">
         <div id="frame"></div>
         <div id="progressbar"></div>
         <div id="message"></div>
      </div>
   </div>

   <script>
      var self = this;
      var loadedProgress = 0;
      var displayedLoadedProgress = 0;
      var titleKey = null;

      var loadingTitleKeys = [
         'stonehearth:jobs.worker.worker_description.display_name',
         'stonehearth:jobs.farmer.farmer_description.display_name',
         'stonehearth:jobs.trapper.trapper_description.display_name',
         'stonehearth:jobs.shepherd.shepherd_description.display_name',
         'stonehearth:jobs.footman.footman_description.display_name',
         'stonehearth:jobs.archer.archer_description.display_name',
         'stonehearth:jobs.blacksmith.blacksmith_description.display_name',
         'stonehearth:jobs.carpenter.carpenter_description.display_name',
         'stonehearth:jobs.mason.mason_description.display_name',
         'stonehearth:jobs.weaver.weaver_description.display_name',
         'stonehearth:jobs.cook.cook_description.display_name',
         'stonehearth:jobs.herbalist.herbalist_description.display_name',
         'stonehearth:jobs.engineer.engineer_description.display_name',
         'stonehearth:jobs.knight.knight_description.display_name',
         'stonehearth:jobs.cleric.cleric_description.display_name',
         'stonehearth:jobs.potter.potter_description.display_name',
         'stonehearth:jobs.geomancer.geomancer_description.display_name',
         'stonehearth:entities.critters.sheep.display_name',
         'stonehearth:entities.critters.poyo.display_name',
         'stonehearth:entities.critters.rabbit.display_name',
         'stonehearth:entities.critters.boar.display_name',
         'stonehearth:entities.monsters.forest.stone_golem.display_name'
      ];

      var setRandomLoadingTitle = function() {
         if (!titleKey) {
            var randomIndex = Math.floor(Math.random() * loadingTitleKeys.length);
            titleKey = loadingTitleKeys[randomIndex];
         }

         var localizedTitle = i18n.t(titleKey);
         if (!localizedTitle || localizedTitle === titleKey) {
            localizedTitle = 'MAGMASMITH';
         }

         self.$('#title').html(localizedTitle);
      };

      self._progressbar = $("#progressbar");
      self._progressbar.progressbar({
         value: 0
      });

      var updateLoadingTextTick = 1;
      var loadingText = null;
      var tipOfDay = null;
      var ticksAt100 = 0;
      var ticksSpentLoading = 0;

      var updateProgressBarVisuals = function() {
         if (finishedLoading) {
            if (displayedLoadedProgress > 97) {
               displayedLoadedProgress = 97;
            }
         } else {
            if (displayedLoadedProgress > 90) {
               displayedLoadedProgress = 90;
            }
         }
         self._progressbar.progressbar("option", "value", displayedLoadedProgress);
      };

      var finishedLoading = false;
      radiant.call('radiant:get_load_progress_deferred')
         .progress(function(o) {
            loadedProgress = o.progress;
            if (loadedProgress > 99) {
               displayedLoadedProgress = 90;
               finishedLoading = true;
            } else if (loadedProgress > displayedLoadedProgress) {
               displayedLoadedProgress = loadedProgress;
               updateProgressBarVisuals();
            }
         });

      var MAX_TICKS_SPENT_LOADING = 50;
      var TICKS_WARM_UP_MULTIPLIER = 0.7;

      self._intervalTicket = setInterval(function() {
         setRandomLoadingTitle();

         if (!loadingText) {
            loadingText = i18n.t('stonehearth:ui.shell.loading_screen.initial_load_game_text');
            self.$('#message').html(loadingText);
         }

         if (!tipOfDay) {
            var tips = i18n.t('stonehearth:ui.shell.loading_screen.tips', { returnObjectTrees: true });
            var tipKeys = Object.keys(tips);
            var tipRandom = Math.floor(Math.random() * tipKeys.length);
            tipOfDay = tips[tipKeys[tipRandom]];
            self.$('#description').html(tipOfDay);
         }

         if (finishedLoading) {
            ticksAt100++;
         } else if (ticksSpentLoading < MAX_TICKS_SPENT_LOADING) {
            ticksSpentLoading++;
         }

         if (displayedLoadedProgress < (loadedProgress + 25)) {
            displayedLoadedProgress++;
         }
         updateProgressBarVisuals();

         updateLoadingTextTick++;
         if (updateLoadingTextTick >= 5) {
            var flavorTexts = i18n.t('stonehearth:ui.shell.loading_screen.loading_map_flavor_text', { returnObjectTrees: true });
            var flavorKeys = Object.keys(flavorTexts);
            var flavorRandom = Math.floor(Math.random() * flavorKeys.length);
            loadingText = flavorTexts[flavorKeys[flavorRandom]];
            self.$('#message').html(loadingText);
            updateLoadingTextTick = 0;
         }

         if (ticksAt100 > (ticksSpentLoading * TICKS_WARM_UP_MULTIPLIER)) {
            displayedLoadedProgress = 100;
            updateProgressBarVisuals();
            radiant.call('radiant:reload_browser');
         }
      }, 1000);
   </script>
</body>
</html>
